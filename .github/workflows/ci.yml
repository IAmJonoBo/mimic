name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint job - fast feedback on code quality
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint workspace
        run: pnpm lint

  # Type checking job
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  # Test job
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        if: always()
        with:
          directory: ./coverage

  # Web app build
  build-web:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build design tokens
        run: pnpm --filter @mimic/design-tokens build

      - name: Build web app
        run: pnpm --filter my-qwik-empty-starter build

      - name: Upload web build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/dist

  # Desktop app build matrix
  build-desktop:
    runs-on: ${{ matrix.os }}
    needs: [lint, typecheck]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # Install platform dependencies
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build design tokens
        run: pnpm --filter @mimic/design-tokens build

      - name: Build desktop app (debug)
        run: pnpm --filter @mimic/desktop tauri build --debug
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload desktop build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build-${{ matrix.os }}
          path: |
            apps/desktop/src-tauri/target/debug/bundle

  # Mobile builds (conditional on android/ios directories existing)
  build-mobile-android:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Check for Android project
        id: check-android
        run: |
          if [ -d "apps/mobile/android" ]; then
            echo "android-exists=true" >> $GITHUB_OUTPUT
          else
            echo "android-exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Android project not found, skipping Android build"
          fi

      - name: Setup Node.js
        if: steps.check-android.outputs.android-exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install pnpm
        if: steps.check-android.outputs.android-exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Java 17
        if: steps.check-android.outputs.android-exists == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        if: steps.check-android.outputs.android-exists == 'true'
        uses: android-actions/setup-android@v3

      - name: Cache pnpm store
        if: steps.check-android.outputs.android-exists == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        if: steps.check-android.outputs.android-exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build design tokens
        if: steps.check-android.outputs.android-exists == 'true'
        run: pnpm --filter @mimic/design-tokens build

      - name: Build Android debug APK
        if: steps.check-android.outputs.android-exists == 'true'
        working-directory: apps/mobile/android
        run: ./gradlew :app:assembleDebug

      - name: Upload Android build
        if: steps.check-android.outputs.android-exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: apps/mobile/android/app/build/outputs/apk/debug

  build-mobile-ios:
    runs-on: macos-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Check for iOS project
        id: check-ios
        run: |
          if [ -d "apps/mobile/ios" ]; then
            echo "ios-exists=true" >> $GITHUB_OUTPUT
          else
            echo "ios-exists=false" >> $GITHUB_OUTPUT
            echo "::notice::iOS project not found, skipping iOS build"
          fi

      - name: Setup Node.js
        if: steps.check-ios.outputs.ios-exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install pnpm
        if: steps.check-ios.outputs.ios-exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        if: steps.check-ios.outputs.ios-exists == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        if: steps.check-ios.outputs.ios-exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build design tokens
        if: steps.check-ios.outputs.ios-exists == 'true'
        run: pnpm --filter @mimic/design-tokens build

      - name: Build iOS for simulator (Debug)
        if: steps.check-ios.outputs.ios-exists == 'true'
        working-directory: apps/mobile/ios
        run: |
          xcodebuild -workspace *.xcworkspace -scheme * -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15' CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS build
        if: steps.check-ios.outputs.ios-exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: apps/mobile/ios/build

  # Summary job that requires all builds to pass
  build-summary:
    runs-on: ubuntu-latest
    needs: [test, build-web, build-desktop, build-mobile-android, build-mobile-ios]
    if: always()
    steps:
      - name: Check build results
        run: |
          echo "Build Summary:"
          echo "- Test: ${{ needs.test.result }}"
          echo "- Web Build: ${{ needs.build-web.result }}"
          echo "- Desktop Build: ${{ needs.build-desktop.result }}"
          echo "- Android Build: ${{ needs.build-mobile-android.result }}"
          echo "- iOS Build: ${{ needs.build-mobile-ios.result }}"
          
          if [[ "${{ needs.test.result }}" != "success" || 
                "${{ needs.build-web.result }}" != "success" || 
                "${{ needs.build-desktop.result }}" != "success" ||
                ("${{ needs.build-mobile-android.result }}" != "success" && "${{ needs.build-mobile-android.result }}" != "skipped") ||
                ("${{ needs.build-mobile-ios.result }}" != "success" && "${{ needs.build-mobile-ios.result }}" != "skipped") ]]; then
            echo "::error::One or more required builds failed"
            exit 1
          fi
          
          echo "::notice::All builds completed successfully!"
